name: Run Bot1

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check files
        run: ls -R

      - name: Run bot1
        run: python botsupertrend1.py
        env:
          TOKEN: ${{ secrets.TOKEN }}
